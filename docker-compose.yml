services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-model-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:9b}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "[ollama-model-pull] Iniciando download do modelo: $$OLLAMA_MODEL"
        ollama pull $$OLLAMA_MODEL 2>&1 | while IFS= read -r line; do
          echo "[ollama-model-pull] $$line"
        done
        echo "[ollama-model-pull] Download concluido: $$OLLAMA_MODEL"
    restart: "no"

volumes:
  ollama_data:
